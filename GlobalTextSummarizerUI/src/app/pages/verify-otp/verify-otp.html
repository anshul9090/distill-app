<app-particle-background></app-particle-background>
<div class="verify-container">
  <mat-card class="verify-card">
    <mat-card-header>
      <mat-card-title>Verify Your Email</mat-card-title>
      <mat-card-subtitle>
        OTP sent to {{email}}
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Enter OTP</mat-label>
  <input matInput [(ngModel)]="otpCode"
       (keydown.enter)="onVerify()"
       type="text" maxlength="6"
       placeholder="6 digit code">
      </mat-form-field>

      <p style="color:red" *ngIf="errorMessage">{{errorMessage}}</p>
      <p style="color:green" *ngIf="successMessage">{{successMessage}}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary"
              style="width:100%" 
              (click)="onVerify()"
              [disabled]="isLoading">
        {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
      </button>

      <p style="text-align:center; margin-top:16px">
        Didn't receive OTP? 
        <a style="cursor:pointer; color:#667eea" 
           (click)="onResendOtp()">Resend OTP</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
